{% extends "base.html" %}
{% block title %}Log in — Expense Tracker{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome back</h1>
      <p>Log in to your account</p>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email">
        <span class="field-error" id="email-error" role="alert"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Your password" required autocomplete="current-password">
        <span class="field-error" id="password-error" role="alert"></span>
      </div>

      <div class="form-check">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Keep me logged in</label>
      </div>

      <div class="form-group" id="form-error-wrap" style="display:none">
        <span class="field-error" id="form-error" role="alert"></span>
      </div>

      <button type="submit" class="btn-primary btn-full" id="submit-btn">
        Log in
      </button>
    </form>

    <p class="auth-footer">
      No account yet?
      <a href="{{ url_for('main.register_page') }}">Create one</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;

  clearAuthErrors();

  if (!email) { showAuthError('email-error', 'Email is required.'); return; }
  if (!password) { showAuthError('password-error', 'Password is required.'); return; }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password, remember }),
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else if (data.errors) {
      Object.entries(data.errors).forEach(([field, msg]) => {
        showAuthError(field + '-error', Array.isArray(msg) ? msg[0] : msg);
      });
    } else {
      document.getElementById('form-error-wrap').style.display = '';
      showAuthError('form-error', data.error || 'Login failed.');
    }
  } catch (err) {
    document.getElementById('form-error-wrap').style.display = '';
    showAuthError('form-error', 'Cannot connect to server.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Log in';
  }
});

function showAuthError(id, msg) {
  const el = document.getElementById(id);
  if (el) el.textContent = msg;
}
function clearAuthErrors() {
  ['email-error','password-error','form-error'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '';
  });
  document.getElementById('form-error-wrap').style.display = 'none';
}
</script>
{% endblock %}
